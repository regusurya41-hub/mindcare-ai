<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MindCare AI — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #070b17;
      font-family: 'DM Sans', system-ui, sans-serif;
      color: white;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 28px;
      padding: 40px 32px;
      max-width: 420px;
      backdrop-filter: blur(20px);
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 24px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.02em; }
    p { font-size: 14px; line-height: 1.75; color: rgba(255,255,255,0.55); margin-bottom: 24px; }
    button {
      padding: 12px 28px;
      border-radius: 14px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      font-size: 14px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(99,102,241,0.35);
    }
    .breathing {
      margin: 20px auto 0;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: rgba(99,102,241,0.20);
      animation: breathe 5s ease-in-out infinite;
      display: grid; place-items: center;
      font-size: 28px;
    }
    @keyframes breathe {
      0%,100% { transform: scale(0.85); opacity: 0.6; }
      50%      { transform: scale(1.15); opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌙</div>
    <h1>You're offline</h1>
    <p>MindCare AI needs a connection for the AI and real-time features. While you wait, try a breathing moment below.</p>
    <button onclick="location.reload()">Try reconnecting</button>
    <div class="breathing" title="Breathe with this orb">💜</div>
    <p style="margin-top: 16px; font-size: 12px;">Breathe in as it grows · breathe out as it shrinks</p>
  </div>
</body>
</html>
