<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- ── Fonts: Syne (display) + DM Sans (body) + DM Mono ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- ── SEO ── -->
    <title>MindCare AI — Your Private Emotional Wellness Companion</title>
    <meta name="description" content="MindCare AI offers AI-powered emotional wellness support, mood tracking, journaling, and calming tools — all private, anonymous, and free." />
    <meta name="keywords" content="mental wellness, AI therapy, mood tracker, journal, anxiety support, mindfulness" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://mindcare-ai-frontend.vercel.app/" />

    <!-- ── Open Graph ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://mindcare-ai-frontend.vercel.app/" />
    <meta property="og:title"       content="MindCare AI — Emotional Wellness Companion" />
    <meta property="og:description" content="Private AI-powered mood tracking, journaling, and emotional support — available 24/7." />
    <meta property="og:image"       content="https://mindcare-ai-frontend.vercel.app/og-image.png" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="MindCare AI" />
    <meta name="twitter:description" content="Your private emotional wellness companion." />
    <meta name="twitter:image"       content="https://mindcare-ai-frontend.vercel.app/og-image.png" />

    <!-- ── PWA ── -->
    <meta name="theme-color" content="#6366f1" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ── JSON-LD structured data ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "MindCare AI",
      "description": "AI-powered emotional wellness platform with mood tracking, journaling, and calm tools.",
      "applicationCategory": "HealthApplication",
      "url": "https://mindcare-ai-frontend.vercel.app",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>

    <!-- ── Dark mode flicker prevention ── -->
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('mindcare_theme');
          if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
